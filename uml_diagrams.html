<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Fitness Tracker – UML Diagrams</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    padding: 40px;
  }
  h1 { color: #38bdf8; font-size: 26px; margin-bottom: 6px; }
  .sub { color: #64748b; margin-bottom: 40px; font-size: 14px; }
  h2 { color: #38bdf8; font-size: 18px; margin: 40px 0 16px; border-left: 4px solid #38bdf8; padding-left: 12px; }
  .diagram-wrap {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 32px;
    overflow-x: auto;
  }
  svg text { font-family: 'Segoe UI', sans-serif; }
  p.note { color: #94a3b8; font-size: 13px; margin-top: 12px; }
</style>
</head>
<body>
<h1>🏃 ABC Fitness Tracker – UML Diagrams</h1>
<p class="sub">Professional Certificate in Java Programming L1 · Final Assignment · Ayesh Almeida</p>

<!-- ================================================================
     USE-CASE DIAGRAM
     ================================================================ -->
<h2>1. Use-Case Diagram</h2>
<div class="diagram-wrap">
<svg viewBox="0 0 900 540" width="100%" style="max-width:900px;display:block;margin:auto;">

  <!-- background -->
  <rect width="900" height="540" fill="#0f172a" rx="12"/>

  <!-- System boundary -->
  <rect x="200" y="30" width="560" height="480" rx="10"
        fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="480" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#64748b">
    Fitness Tracker System
  </text>

  <!-- Actor: Employee -->
  <g transform="translate(70,220)">
    <ellipse cx="0" cy="-32" rx="18" ry="18" fill="none" stroke="#38bdf8" stroke-width="2"/>
    <line x1="0" y1="-14" x2="0" y2="18" stroke="#38bdf8" stroke-width="2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#38bdf8" stroke-width="2"/>
    <line x1="0" y1="18" x2="-18" y2="44" stroke="#38bdf8" stroke-width="2"/>
    <line x1="0" y1="18" x2="18" y2="44" stroke="#38bdf8" stroke-width="2"/>
    <text x="0" y="62" text-anchor="middle" font-size="13" fill="#e2e8f0">Employee</text>
  </g>

  <!-- Actor: Admin/System -->
  <g transform="translate(830,220)">
    <ellipse cx="0" cy="-32" rx="18" ry="18" fill="none" stroke="#a78bfa" stroke-width="2"/>
    <line x1="0" y1="-14" x2="0" y2="18" stroke="#a78bfa" stroke-width="2"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#a78bfa" stroke-width="2"/>
    <line x1="0" y1="18" x2="-18" y2="44" stroke="#a78bfa" stroke-width="2"/>
    <line x1="0" y1="18" x2="18" y2="44" stroke="#a78bfa" stroke-width="2"/>
    <text x="0" y="62" text-anchor="middle" font-size="13" fill="#e2e8f0">System</text>
  </g>

  <!-- Use cases -->
  <!-- UC1: Add Activity -->
  <ellipse cx="400" cy="100" rx="120" ry="32" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="400" y="104" text-anchor="middle" font-size="13" fill="#e2e8f0">Add New Activity</text>

  <!-- UC2: View Activities -->
  <ellipse cx="400" cy="190" rx="120" ry="32" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="400" y="194" text-anchor="middle" font-size="13" fill="#e2e8f0">View Activities</text>

  <!-- UC3: Filter Activities -->
  <ellipse cx="400" cy="280" rx="120" ry="32" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="400" y="284" text-anchor="middle" font-size="13" fill="#e2e8f0">Filter Activities</text>

  <!-- UC4: View Leaderboard -->
  <ellipse cx="400" cy="370" rx="120" ry="32" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="400" y="374" text-anchor="middle" font-size="13" fill="#e2e8f0">View Leaderboard</text>

  <!-- UC5: Calculate Points (system) -->
  <ellipse cx="620" cy="100" rx="120" ry="32" fill="#2d1f5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="96" text-anchor="middle" font-size="12" fill="#c4b5fd">«include»</text>
  <text x="620" y="112" text-anchor="middle" font-size="13" fill="#e2e8f0">Calculate Points</text>

  <!-- UC6: Persist to DB (system) -->
  <ellipse cx="620" cy="190" rx="120" ry="32" fill="#2d1f5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="186" text-anchor="middle" font-size="12" fill="#c4b5fd">«include»</text>
  <text x="620" y="202" text-anchor="middle" font-size="13" fill="#e2e8f0">Persist to Database</text>

  <!-- UC7: Rank Employees (system) -->
  <ellipse cx="620" cy="370" rx="120" ry="32" fill="#2d1f5e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="620" y="366" text-anchor="middle" font-size="12" fill="#c4b5fd">«include»</text>
  <text x="620" y="382" text-anchor="middle" font-size="13" fill="#e2e8f0">Rank Employees</text>

  <!-- Employee associations -->
  <line x1="92" y1="198" x2="280" y2="108" stroke="#64748b" stroke-width="1.5"/>
  <line x1="92" y1="205" x2="280" y2="192" stroke="#64748b" stroke-width="1.5"/>
  <line x1="92" y1="215" x2="280" y2="276" stroke="#64748b" stroke-width="1.5"/>
  <line x1="92" y1="225" x2="280" y2="368" stroke="#64748b" stroke-width="1.5"/>

  <!-- include: AddActivity → CalculatePoints -->
  <line x1="520" y1="100" x2="500" y2="100" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr)"/>
  <!-- include: AddActivity → PersistDB -->
  <line x1="400" y1="132" x2="500" y2="170" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr)"/>
  <!-- include: ViewLeaderboard → RankEmployees -->
  <line x1="520" y1="370" x2="500" y2="370" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5 3"
        marker-end="url(#arr)"/>

  <!-- System associations -->
  <line x1="830" y1="198" x2="740" y2="108" stroke="#64748b" stroke-width="1.5"/>
  <line x1="830" y1="210" x2="740" y2="192" stroke="#64748b" stroke-width="1.5"/>
  <line x1="830" y1="222" x2="740" y2="372" stroke="#64748b" stroke-width="1.5"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g transform="translate(220,460)">
    <rect x="0" y="0" width="460" height="44" rx="6" fill="#1e293b" stroke="#334155"/>
    <ellipse cx="22" cy="22" rx="14" ry="10" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="44" y="27" font-size="12" fill="#94a3b8">Employee-facing use case</text>
    <ellipse cx="210" cy="22" rx="14" ry="10" fill="#2d1f5e" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="232" y="27" font-size="12" fill="#94a3b8">System use case (included)</text>
    <line x1="370" y1="22" x2="396" y2="22" stroke="#a78bfa" stroke-dasharray="4 2"/>
    <text x="400" y="27" font-size="12" fill="#94a3b8">«include»</text>
  </g>
</svg>
</div>


<!-- ================================================================
     CLASS DIAGRAM
     ================================================================ -->
<h2>2. Class Diagram</h2>
<div class="diagram-wrap">
<svg viewBox="0 0 1000 700" width="100%" style="max-width:1000px;display:block;margin:auto;">

  <rect width="1000" height="700" fill="#0f172a" rx="12"/>

  <!-- ── Helper macros via reuse of <use> not available; draw each class manually ── -->

  <!-- ════ Employee ════ -->
  <g transform="translate(30,30)">
    <rect width="190" height="130" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <rect width="190" height="30" rx="6" fill="#0c4a6e"/>
    <rect x="0" y="24" width="190" height="6" fill="#0c4a6e"/>
    <text x="95" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#38bdf8">Employee</text>
    <line x1="0" y1="30" x2="190" y2="30" stroke="#334155"/>
    <text x="10" y="48" font-size="11" fill="#94a3b8">– id : int</text>
    <text x="10" y="63" font-size="11" fill="#94a3b8">– name : String</text>
    <text x="10" y="78" font-size="11" fill="#94a3b8">– department : String</text>
    <line x1="0" y1="86" x2="190" y2="86" stroke="#334155"/>
    <text x="10" y="101" font-size="11" fill="#c4b5fd">+ getId() : int</text>
    <text x="10" y="116" font-size="11" fill="#c4b5fd">+ getName() : String</text>
  </g>

  <!-- ════ ActivityType ════ -->
  <g transform="translate(30,220)">
    <rect width="190" height="160" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <rect width="190" height="30" rx="6" fill="#0c4a6e"/>
    <rect x="0" y="24" width="190" height="6" fill="#0c4a6e"/>
    <text x="95" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#38bdf8">ActivityType</text>
    <line x1="0" y1="30" x2="190" y2="30" stroke="#334155"/>
    <text x="10" y="48" font-size="11" fill="#94a3b8">– id : int</text>
    <text x="10" y="63" font-size="11" fill="#94a3b8">– typeName : String</text>
    <text x="10" y="78" font-size="11" fill="#94a3b8">– unit : String</text>
    <text x="10" y="93" font-size="11" fill="#94a3b8">– pointsPerUnit : double</text>
    <line x1="0" y1="101" x2="190" y2="101" stroke="#334155"/>
    <text x="10" y="116" font-size="11" fill="#c4b5fd">+ calculatePoints(qty:double)</text>
    <text x="10" y="131" font-size="11" fill="#c4b5fd">    : double</text>
    <text x="10" y="146" font-size="11" fill="#c4b5fd">+ getTypeName() : String</text>
  </g>

  <!-- ════ Activity ════ -->
  <g transform="translate(390,30)">
    <rect width="230" height="240" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
    <rect width="230" height="30" rx="6" fill="#422006"/>
    <rect x="0" y="24" width="230" height="6" fill="#422006"/>
    <text x="115" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#fbbf24">Activity</text>
    <line x1="0" y1="30" x2="230" y2="30" stroke="#334155"/>
    <text x="10" y="48" font-size="11" fill="#94a3b8">– id : int</text>
    <text x="10" y="63" font-size="11" fill="#94a3b8">– employeeId : int</text>
    <text x="10" y="78" font-size="11" fill="#94a3b8">– employeeName : String</text>
    <text x="10" y="93" font-size="11" fill="#94a3b8">– activityTypeId : int</text>
    <text x="10" y="108" font-size="11" fill="#94a3b8">– activityTypeName : String</text>
    <text x="10" y="123" font-size="11" fill="#94a3b8">– quantity : double</text>
    <text x="10" y="138" font-size="11" fill="#94a3b8">– pointsEarned : double</text>
    <text x="10" y="153" font-size="11" fill="#94a3b8">– activityDate : LocalDate</text>
    <text x="10" y="168" font-size="11" fill="#94a3b8">– notes : String</text>
    <line x1="0" y1="176" x2="230" y2="176" stroke="#334155"/>
    <text x="10" y="191" font-size="11" fill="#c4b5fd">+ getEmployeeId() : int</text>
    <text x="10" y="206" font-size="11" fill="#c4b5fd">+ getPointsEarned() : double</text>
    <text x="10" y="221" font-size="11" fill="#c4b5fd">+ getActivityDate() : LocalDate</text>
  </g>

  <!-- ════ LeaderboardEntry ════ -->
  <g transform="translate(390,340)">
    <rect width="220" height="170" rx="6" fill="#1e293b" stroke="#4ade80" stroke-width="2"/>
    <rect width="220" height="30" rx="6" fill="#052e16"/>
    <rect x="0" y="24" width="220" height="6" fill="#052e16"/>
    <text x="110" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#4ade80">LeaderboardEntry</text>
    <line x1="0" y1="30" x2="220" y2="30" stroke="#334155"/>
    <text x="10" y="48" font-size="11" fill="#94a3b8">– rank : int</text>
    <text x="10" y="63" font-size="11" fill="#94a3b8">– employeeId : int</text>
    <text x="10" y="78" font-size="11" fill="#94a3b8">– employeeName : String</text>
    <text x="10" y="93" font-size="11" fill="#94a3b8">– department : String</text>
    <text x="10" y="108" font-size="11" fill="#94a3b8">– totalPoints : double</text>
    <line x1="0" y1="116" x2="220" y2="116" stroke="#334155"/>
    <text x="10" y="131" font-size="11" fill="#c4b5fd">+ getRank() : int</text>
    <text x="10" y="146" font-size="11" fill="#c4b5fd">+ getTotalPoints() : double</text>
  </g>

  <!-- ════ EmployeeDAO ════ -->
  <g transform="translate(700,30)">
    <rect width="240" height="100" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
    <rect width="240" height="30" rx="6" fill="#4a0000"/>
    <rect x="0" y="24" width="240" height="6" fill="#4a0000"/>
    <text x="120" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#f472b6">EmployeeDAO</text>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#334155"/>
    <text x="10" y="50" font-size="11" fill="#94a3b8">«uses DatabaseConnection»</text>
    <line x1="0" y1="58" x2="240" y2="58" stroke="#334155"/>
    <text x="10" y="74" font-size="11" fill="#c4b5fd">+ getAllEmployees()</text>
    <text x="10" y="89" font-size="11" fill="#c4b5fd">    : List&lt;Employee&gt;</text>
  </g>

  <!-- ════ ActivityTypeDAO ════ -->
  <g transform="translate(700,180)">
    <rect width="240" height="100" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
    <rect width="240" height="30" rx="6" fill="#4a0000"/>
    <rect x="0" y="24" width="240" height="6" fill="#4a0000"/>
    <text x="120" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#f472b6">ActivityTypeDAO</text>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#334155"/>
    <text x="10" y="50" font-size="11" fill="#94a3b8">«uses DatabaseConnection»</text>
    <line x1="0" y1="58" x2="240" y2="58" stroke="#334155"/>
    <text x="10" y="74" font-size="11" fill="#c4b5fd">+ getAllActivityTypes()</text>
    <text x="10" y="89" font-size="11" fill="#c4b5fd">    : List&lt;ActivityType&gt;</text>
  </g>

  <!-- ════ ActivityDAO ════ -->
  <g transform="translate(700,330)">
    <rect width="240" height="130" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
    <rect width="240" height="30" rx="6" fill="#4a0000"/>
    <rect x="0" y="24" width="240" height="6" fill="#4a0000"/>
    <text x="120" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#f472b6">ActivityDAO</text>
    <line x1="0" y1="30" x2="240" y2="30" stroke="#334155"/>
    <text x="10" y="50" font-size="11" fill="#94a3b8">«uses DatabaseConnection»</text>
    <line x1="0" y1="58" x2="240" y2="58" stroke="#334155"/>
    <text x="10" y="74" font-size="11" fill="#c4b5fd">+ addActivity(a:Activity)</text>
    <text x="10" y="89" font-size="11" fill="#c4b5fd">+ getActivities(eId,tId)</text>
    <text x="10" y="104" font-size="11" fill="#c4b5fd">    : List&lt;Activity&gt;</text>
    <text x="10" y="119" font-size="11" fill="#c4b5fd">+ getLeaderboard()</text>
  </g>

  <!-- ════ MainController ════ -->
  <g transform="translate(390,560)">
    <rect width="280" height="100" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
    <rect width="280" height="30" rx="6" fill="#431407"/>
    <rect x="0" y="24" width="280" height="6" fill="#431407"/>
    <text x="140" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#fb923c">MainController</text>
    <line x1="0" y1="30" x2="280" y2="30" stroke="#334155"/>
    <text x="10" y="50" font-size="11" fill="#94a3b8">– employeeDAO, activityTypeDAO, activityDAO</text>
    <line x1="0" y1="58" x2="280" y2="58" stroke="#334155"/>
    <text x="10" y="74" font-size="11" fill="#c4b5fd">+ handleSaveActivity()</text>
    <text x="10" y="89" font-size="11" fill="#c4b5fd">+ handleApplyFilter()  + handleRefreshLeaderboard()</text>
  </g>

  <!-- ════ DatabaseConnection ════ -->
  <g transform="translate(700,510)">
    <rect width="240" height="90" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2" stroke-dasharray="6 3"/>
    <rect width="240" height="30" rx="6" fill="#1e293b"/>
    <text x="120" y="21" text-anchor="middle" font-size="13" font-weight="bold" fill="#64748b">DatabaseConnection</text>
    <text x="120" y="36" text-anchor="middle" font-size="10" fill="#64748b">«utility / singleton»</text>
    <line x1="0" y1="42" x2="240" y2="42" stroke="#334155"/>
    <text x="10" y="58" font-size="11" fill="#c4b5fd">+ getConnection() : Connection</text>
    <text x="10" y="73" font-size="11" fill="#c4b5fd">+ closeConnection()</text>
  </g>

  <!-- ════ Relationships ════ -->
  <!-- Employee → Activity (1..* association) -->
  <line x1="220" y1="95" x2="390" y2="120" stroke="#64748b" stroke-width="1.5"/>
  <text x="270" y="100" font-size="10" fill="#64748b">1</text>
  <text x="350" y="115" font-size="10" fill="#64748b">0..*</text>

  <!-- ActivityType → Activity -->
  <line x1="220" y1="285" x2="390" y2="200" stroke="#64748b" stroke-width="1.5"/>
  <text x="240" y="270" font-size="10" fill="#64748b">1</text>
  <text x="360" y="210" font-size="10" fill="#64748b">0..*</text>

  <!-- EmployeeDAO → Employee (dependency) -->
  <line x1="700" y1="60" x2="620" y2="105" stroke="#64748b" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- ActivityTypeDAO → ActivityType (dependency) -->
  <line x1="700" y1="225" x2="620" y2="270" stroke="#64748b" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- ActivityDAO → Activity (dependency) -->
  <line x1="700" y1="370" x2="620" y2="180" stroke="#64748b" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- ActivityDAO → LeaderboardEntry (creates) -->
  <line x1="700" y1="400" x2="610" y2="430" stroke="#64748b" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- MainController → DAOs -->
  <line x1="620" y1="600" x2="700" y2="80" stroke="#fb923c" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="660" y1="600" x2="760" y2="280" stroke="#fb923c" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="680" y1="610" x2="800" y2="460" stroke="#fb923c" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- DAOs → DatabaseConnection -->
  <line x1="820" y1="130" x2="820" y2="510" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="820" y1="280" x2="820" y2="510" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="820" y1="460" x2="820" y2="510" stroke="#64748b" stroke-width="1"/>

  <!-- Legend -->
  <g transform="translate(30,570)">
    <rect width="330" height="110" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="165" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#94a3b8">Legend</text>
    <line x1="10" y1="32" x2="50" y2="32" stroke="#64748b"/>
    <text x="58" y="36" font-size="11" fill="#94a3b8">Association (has-a)</text>
    <line x1="10" y1="52" x2="50" y2="52" stroke="#64748b" stroke-dasharray="5 3"/>
    <text x="58" y="56" font-size="11" fill="#94a3b8">Dependency (uses)</text>
    <rect x="10" y="66" width="40" height="16" rx="3" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="58" y="78" font-size="11" fill="#94a3b8">Model class</text>
    <rect x="10" y="88" width="40" height="16" rx="3" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
    <text x="58" y="100" font-size="11" fill="#94a3b8">DAO class</text>
    <rect x="170" y="66" width="40" height="16" rx="3" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
    <text x="218" y="78" font-size="11" fill="#94a3b8">Controller</text>
    <rect x="170" y="88" width="40" height="16" rx="3" fill="#1e293b" stroke="#64748b" stroke-dasharray="5 3"/>
    <text x="218" y="100" font-size="11" fill="#94a3b8">Utility / Singleton</text>
  </g>
</svg>
</div>
</body>
</html>
